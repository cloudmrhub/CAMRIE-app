AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  CAMRIE Calculation Infrastructure.
  Fargate task (heavy simulation) driven by a Step Functions state machine.
  Lambda (lightweight routing) decides whether to go straight to Fargate.

Parameters:
  StageName:
    Type: String
    Default: Prod
    AllowedValues: [Prod, Dev, Test]

  DataBucketPName:
    Type: String
    Description: S3 bucket where input data (tissue maps, sequences) are stored.

  ResultsBucketPName:
    Type: String
    Description: S3 bucket for successful result ZIPs.

  FailedBucketPName:
    Type: String
    Description: S3 bucket for failure bundles.

  FargateImageUri:
    Type: String
    Description: ECR URI of the pre-built Fargate Docker image.

  ECSClusterName:
    Type: String
    Default: camrie-cluster
    Description: ECS cluster name (created if it does not exist).

  SubnetId1:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet (internet access required for S3/ECR).

  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet (high availability).

  SecurityGroupIds:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for ECS tasks.

  # GPU compute (EC2-backed ECS)
  GpuImageUri:
    Type: String
    Description: ECR URI for the GPU (CUDA) Docker image. Leave empty to disable GPU path.
    Default: ""

  GpuInstanceType:
    Type: String
    Default: g4dn.xlarge
    Description: EC2 GPU instance type (g4dn.xlarge = 1x T4, g5.xlarge = 1x A10G).

Conditions:
  GpuEnabled: !Not [!Equals [!Ref GpuImageUri, ""]]

Resources:

  # ── ECS Cluster ─────────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ECSClusterName

  # ── IAM Role for Fargate tasks ───────────────────────────────────────────────
  FargateTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: CamrieS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !Sub "arn:aws:s3:::${DataBucketPName}"
                  - !Sub "arn:aws:s3:::${DataBucketPName}/*"
              - Effect: Allow
                Action: [s3:PutObject]
                Resource:
                  - !Sub "arn:aws:s3:::${ResultsBucketPName}/*"
                  - !Sub "arn:aws:s3:::${FailedBucketPName}/*"

  FargateTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CamrieTaskS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !Sub "arn:aws:s3:::${DataBucketPName}"
                  - !Sub "arn:aws:s3:::${DataBucketPName}/*"
              - Effect: Allow
                Action: [s3:PutObject]
                Resource:
                  - !Sub "arn:aws:s3:::${ResultsBucketPName}/*"
                  - !Sub "arn:aws:s3:::${FailedBucketPName}/*"

  # ── Fargate Task Definition ──────────────────────────────────────────────────
  FargateTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "camrie-task-${StageName}"
      Cpu: "4096"       # 4 vCPU
      Memory: "16384"   # 16 GB
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt FargateTaskExecutionRole.Arn
      TaskRoleArn:      !GetAtt FargateTaskRole.Arn
      ContainerDefinitions:
        - Name: camrie-worker
          Image: !Ref FargateImageUri
          Essential: true
          Environment:
            - Name: ResultsBucketName
              Value: !Ref ResultsBucketPName
            - Name: FailedBucketName
              Value: !Ref FailedBucketPName
            - Name: CAMRIE_THREADS
              Value: "4"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:  !Ref FargateLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: camrie

  FargateLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/camrie-${StageName}"
      RetentionInDays: 30

  # ── EC2 GPU path (only created when GpuImageUri is set) ─────────────────────
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Condition: GpuEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      # Only the two AWS-managed policies needed to register the instance with ECS.
      # S3 access for simulation data is handled by FargateTaskRole on the container.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: GpuEnabled
    Properties:
      Roles: [!Ref EC2InstanceRole]

  GpuLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: GpuEnabled
    Properties:
      LaunchTemplateData:
        # ECS-optimised GPU AMI (Amazon Linux 2, latest)
        ImageId: !Sub "{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2/gpu/recommended/image_id}}"
        InstanceType: !Ref GpuInstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds: [!Ref SecurityGroupIds]
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            echo ECS_CLUSTER=${ECSClusterName}      >> /etc/ecs/ecs.config
            echo ECS_ENABLE_GPU_SUPPORT=true         >> /etc/ecs/ecs.config
            echo ECS_ENABLE_AWSLOGS_EXECUTIONROLE_OVERRIDE=true >> /etc/ecs/ecs.config
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 100
              VolumeType: gp3
              DeleteOnTermination: true

  GpuAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Condition: GpuEnabled
    Properties:
      MinSize: "0"
      MaxSize: "2"
      DesiredCapacity: "0"
      VPCZoneIdentifier: [!Ref SubnetId1, !Ref SubnetId2]
      LaunchTemplate:
        LaunchTemplateId: !Ref GpuLaunchTemplate
        Version: !GetAtt GpuLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub "camrie-gpu-${StageName}"
          PropagateAtLaunch: true

  GpuCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Condition: GpuEnabled
    Properties:
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Ref GpuAutoScalingGroup
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
          MinimumScalingStepSize: 1
          MaximumScalingStepSize: 1
        ManagedTerminationProtection: DISABLED

  ClusterCapacityProviderAssociation:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Condition: GpuEnabled
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - !Ref GpuCapacityProvider
      DefaultCapacityProviderStrategy: []

  GpuTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Condition: GpuEnabled
    DependsOn: GpuLogGroup
    Properties:
      Family: !Sub "camrie-gpu-task-${StageName}"
      Cpu: "4096"        # 4 vCPU  (task level, consistent with Fargate task)
      Memory: "14000"   # 14 GB   (task level)
      NetworkMode: awsvpc
      RequiresCompatibilities: [EC2]
      ExecutionRoleArn: !GetAtt FargateTaskExecutionRole.Arn
      TaskRoleArn:      !GetAtt FargateTaskRole.Arn
      ContainerDefinitions:
        - Name: camrie-worker
          Image: !Ref GpuImageUri
          Essential: true
          ResourceRequirements:
            - Type: GPU
              Value: "1"
          MemoryReservation: 12000  # soft limit; hard cap is task-level Memory
          MountPoints:
            - SourceVolume: julia-depot-cache
              ContainerPath: /opt/julia-depot-cache
              ReadOnly: false
          Environment:
            - Name: JULIA_DEPOT_PATH
              Value: "/opt/julia-depot-cache:/opt/julia-depot"
            - Name: ResultsBucketName
              Value: !Ref ResultsBucketPName
            - Name: FailedBucketName
              Value: !Ref FailedBucketPName
            - Name: CAMRIE_THREADS
              Value: "4"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:  !Ref GpuLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: camrie-gpu
      # Host bind-mount: persists Julia/CUDA compiled kernels across tasks
      # on the same EC2 instance.
      # IMPORTANT: mount to /opt/julia-depot-cache (not /opt/julia-depot) so the
      # image's precompiled package depot is not shadowed. JULIA_DEPOT_PATH is set
      # to /opt/julia-depot-cache:/opt/julia-depot so Julia reads from the image
      # depot and writes new caches (CUDA PTX etc.) to the persistent host path.
      Volumes:
        - Name: julia-depot-cache
          Host:
            SourcePath: /opt/julia-depot-cache

  GpuLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: GpuEnabled
    Properties:
      LogGroupName: !Sub "/ecs/camrie-gpu-${StageName}"
      RetentionInDays: 30

  # ── RunJobLambda (routes job → Fargate) ─────────────────────────────────────
  RunJobLambda:
    Type: AWS::Serverless::Function
    Properties:
      Description: Launches a Fargate task to run a CAMRIE simulation job.
      Runtime: python3.11
      Handler: index.lambda_handler
      Timeout: 60
      MemorySize: 256
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ecs:RunTask, iam:PassRole]
              Resource: "*"
            - Effect: Allow
              Action: [s3:PutObject]
              Resource: !Sub "arn:aws:s3:::${DataBucketPName}/_camrie_events/*"
      Environment:
        Variables:
          CLUSTER_ARN:          !GetAtt ECSCluster.Arn
          TASK_DEF_ARN:         !Ref FargateTaskDefinition
          GPU_TASK_DEF_ARN:     !If [GpuEnabled, !Ref GpuTaskDefinition, ""]
          GPU_CAPACITY_PROVIDER: !If [GpuEnabled, !Ref GpuCapacityProvider, ""]
          SUBNET_1:             !Ref SubnetId1
          SUBNET_2:             !Ref SubnetId2
          SECURITY_GROUP:       !Ref SecurityGroupIds
          DATA_BUCKET:          !Ref DataBucketPName
      InlineCode: |
        import json, os, uuid, boto3

        def lambda_handler(event, context):
            ecs = boto3.client("ecs")
            s3  = boto3.client("s3")

            # Detect GPU request — brain API wraps payload under event["task"]
            task    = event.get("task", event) if isinstance(event, dict) else {}
            opts    = task.get("options", {}) if isinstance(task, dict) else {}
            sim     = opts.get("simulation", {}) if isinstance(opts, dict) else {}
            use_gpu = str(sim.get("use_gpu", False)).lower() in ("true", "1", "yes")

            # Write large event JSON to S3 to avoid 8192-char ECS override limit
            data_bucket = os.environ.get("DATA_BUCKET", "")
            event_json  = json.dumps(event)
            if len(event_json) > 7000 and data_bucket:
                event_key        = f"_camrie_events/{uuid.uuid4()}.json"
                s3.put_object(Bucket=data_bucket, Key=event_key, Body=event_json.encode())
                file_event_value = json.dumps({"s3_event_bucket": data_bucket, "s3_event_key": event_key})
                print(f"Stored event at s3://{data_bucket}/{event_key}")
            else:
                file_event_value = event_json

            overrides = {
                "containerOverrides": [{
                    "name": "camrie-worker",
                    "environment": [{"name": "FILE_EVENT", "value": file_event_value}],
                }]
            }

            gpu_task_def  = os.environ.get("GPU_TASK_DEF_ARN", "")
            gpu_cap_prov  = os.environ.get("GPU_CAPACITY_PROVIDER", "")

            if use_gpu and gpu_task_def and gpu_cap_prov:
                print("GPU requested — routing to EC2/GPU task")
                network_cfg = {
                    "awsvpcConfiguration": {
                        "subnets":        [os.environ["SUBNET_1"], os.environ["SUBNET_2"]],
                        "securityGroups": [os.environ["SECURITY_GROUP"]],
                        # EC2 launch type does NOT support assignPublicIp
                    }
                }
                response = ecs.run_task(
                    cluster=os.environ["CLUSTER_ARN"],
                    taskDefinition=gpu_task_def,
                    capacityProviderStrategy=[{"capacityProvider": gpu_cap_prov, "weight": 1}],
                    networkConfiguration=network_cfg,
                    overrides=overrides,
                )
            else:
                if use_gpu:
                    print("GPU requested but GPU path not configured — falling back to CPU/Fargate")
                network_cfg = {
                    "awsvpcConfiguration": {
                        "subnets":        [os.environ["SUBNET_1"], os.environ["SUBNET_2"]],
                        "securityGroups": [os.environ["SECURITY_GROUP"]],
                        "assignPublicIp": "ENABLED",
                    }
                }
                response = ecs.run_task(
                    cluster=os.environ["CLUSTER_ARN"],
                    taskDefinition=os.environ["TASK_DEF_ARN"],
                    launchType="FARGATE",
                    networkConfiguration=network_cfg,
                    overrides=overrides,
                )

            tasks = response.get("tasks", [])
            if not tasks:
                raise RuntimeError(f"ECS RunTask failed: {response.get('failures')}")
            return {"taskArn": tasks[0]["taskArn"], "statusCode": 202}

  # ── IAM Role for Step Functions ──────────────────────────────────────────────
  StateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt RunJobLambda.Arn

  # ── Step Functions state machine ─────────────────────────────────────────────
  CalculationStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Role: !GetAtt StateMachineRole.Arn
      Definition:
        Comment: CAMRIE simulation job orchestrator
        StartAt: RunJob
        States:
          RunJob:
            Type: Task
            Resource: !GetAtt RunJobLambda.Arn
            End: true
            Catch:
              - ErrorEquals: ["States.ALL"]
                ResultPath: $.error
                Next: FailureState
          FailureState:
            Type: Fail
            Comment: Job launch failed

Outputs:
  StateMachineArn:
    Description: ARN of the CAMRIE calculation state machine
    Value: !GetAtt CalculationStateMachine.Arn
    Export:
      Name: !Sub "${AWS::StackName}-StateMachineArn"

  RunJobLambdaArn:
    Description: ARN of the RunJob Lambda
    Value: !GetAtt RunJobLambda.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RunJobLambdaArn"

  ECSClusterArn:
    Description: ARN of the ECS cluster
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ECSClusterArn"

  GpuCapacityProviderName:
    Condition: GpuEnabled
    Description: Name of the GPU ECS capacity provider
    Value: !Ref GpuCapacityProvider
    Export:
      Name: !Sub "${AWS::StackName}-GpuCapacityProvider"

  GpuLogGroupName:
    Condition: GpuEnabled
    Description: CloudWatch log group for GPU tasks
    Value: !Ref GpuLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-GpuLogGroup"
